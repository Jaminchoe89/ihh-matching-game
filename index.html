<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IHH Matching Game</title>
    <link rel="stylesheet" href="./styles.css?v=20260629c" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-card">
        <section class="game-overlay" id="game-overlay" aria-live="polite">
          <div class="overlay-panel">
            <img
              id="overlay-logo"
              class="overlay-logo"
              src="./1x/Logo Light Blue.png"
              alt="Logo"
            />
            <p id="overlay-message" class="overlay-message" hidden></p>
            <p id="overlay-instructions" class="overlay-instructions">
              Match the cards within 20 seconds.
            </p>

            <div id="overlay-leaderboard" class="leaderboard" hidden>
              <h3 class="leaderboard-title">Leaderboard</h3>
              <ol id="leaderboard-list" class="leaderboard-list"></ol>
            </div>

            <form id="overlay-form" class="lead-form" hidden>
              <input
                id="form-name"
                class="lead-input"
                type="text"
                placeholder="Full name"
                maxlength="40"
                autocomplete="name"
                required
              />
              <input
                id="form-phone"
                class="lead-input"
                type="tel"
                placeholder="Phone number"
                maxlength="20"
                inputmode="tel"
                autocomplete="tel"
                required
              />
              <p class="form-hint">Phone number won't be displayed.</p>
              <p id="form-error" class="form-error" hidden></p>
              <button id="form-submit" class="primary-button" type="submit">
                Submit
              </button>
            </form>

            <button id="overlay-button" class="primary-button" type="button">
              Start
            </button>
          </div>
        </section>

        <div class="playfield">
          <header class="hud">
            <div class="timer-bar" aria-live="polite">
              <strong id="timer">20.00</strong>
            </div>
          </header>

          <section
            class="game-board"
            id="game-board"
            aria-label="Memory card board"
          ></section>
        </div>
      </section>
    </main>

    <template id="card-template">
      <button class="memory-card" type="button">
        <span class="card-face card-front"></span>
        <span class="card-face card-back"></span>
      </button>
    </template>

    <script src="./script.js?v=20260629a"></script>
  </body>
</html>
